daily_setup:
  run_once_at: "08:00"

capital_split:
  stock: 0.45
  crypto: 0.45

universe:
  stock:
    count: 3
    select_once_daily: true

  crypto:
    count: 3
    select_once_daily: true

  intraday_change_allowed: false

risk_model:
  type: fixed_fractional
  risk_per_trade: 0.005

sizing:
  method: atr_based
  atr_period: 14
  stop_multiple: 1.5
  atr_timeframe: 1m
  price_reference:
    stock: close
    crypto: last

holding:
  min_hold_seconds: 60
  max_hold_seconds: 300
  enforce_min_hold: true

reentry:
  cooldown_after_exit_seconds: 60
  require_fresh_signal: true

filters:
  regime_filter_required: true

strategies:
  - name: mean_reversion
    enabled: true

  - name: breakout
    enabled: true