default_asset_type: STOCK

data_sources:
  stock:
    path: data/stock/
    format: csv

  crypto:
    path: data/crypto/
    format: csv

required_columns:
  - symbol
  - datetime
  - open
  - high
  - low
  - close
  - volume

indicators:
  rsi:
    period: 14

  ma20:
    period: 20

  bb:
    period: 20
    std: 2