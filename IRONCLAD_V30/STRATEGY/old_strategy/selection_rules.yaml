selector_rules:
  filters:
    - name: "volume_spike"
      type: "ratio"
      field: "volume"
      threshold: 2.5   # 수정

    - name: "strong_candle"
      type: "ratio"
      field: "body_ratio"
      threshold: 0.5   # 추가

    - name: "breakout"
      type: "condition"
      field: "is_breakout"
      value: true      # 추가

  ranking:
    - field: "volume"
      order: "desc"

  top_k: 10   # 성과 기반 필터